name: Linux Test

on: [push, workflow_dispatch]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install aria2
        run: sudo apt update && sudo apt install -y aria2

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.local/share/playwright-browsers
          key: ${{ runner.os }}-playwright-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.python-version }}-
            ${{ runner.os }}-playwright-

      - name: Install Python deps
        run: pip install playwright playwright-stealth rich

      - name: Install Playwright Chromium
        run: python -m playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.local/share/playwright-browsers

      - name: Verify aria2 installation
        run: aria2c --version

      - name: Verify Python version
        run: python --version

      - name: Verify Playwright installation
        run: python -c "from playwright.sync_api import sync_playwright; print('Playwright OK')"

      - name: Check disk space
        run: |
          freeGB=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          echo "Free disk space: ${freeGB}GB"
          if [ "$freeGB" -lt 5 ]; then
            echo "WARNING: Low disk space"
          fi

      - name: Dry run test - Cyberpunk 2077
        run: python fitgrab https://fitgirl-repacks.site/cyberpunk-2077/ --dry-run
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.local/share/playwright-browsers

      - name: Test with custom directory
        run: python fitgrab https://fitgirl-repacks.site/stellar-blade/ --dir ~/Games --dry-run
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.local/share/playwright-browsers

      - name: Test concurrency flag
        run: python fitgrab https://fitgirl-repacks.site/elden-ring/ --concurrency 4 --dry-run
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.local/share/playwright-browsers
