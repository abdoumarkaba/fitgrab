name: Health Check

on:
  schedule:
    # Run every Friday at 18:00 UTC (Casablanca afternoon)
    - cron: '0 18 * * 5'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aria2
        run: sudo apt update && sudo apt install -y aria2

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-healthcheck-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-healthcheck-
            ${{ runner.os }}-playwright-

      - name: Install Python deps
        run: pip install playwright playwright-stealth rich

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Test FitGirl site accessibility
        run: |
          curl -s -o /dev/null -w "FitGirl site status: %{http_code}\n" https://fitgirl-repacks.site/
          
          if ! curl -s --connect-timeout 10 https://fitgirl-repacks.site/ > /dev/null; then
            echo "ERROR: Cannot reach FitGirl site"
            exit 1
          fi

      - name: Test FuckingFast CDN accessibility
        run: |
          if ! curl -s --connect-timeout 10 https://fuckingfast.co/ > /dev/null; then
            echo "WARNING: Cannot reach FuckingFast CDN"
          else
            echo "FuckingFast CDN is accessible"
          fi

      - name: Test scraping with dry-run
        run: python fitgrab https://fitgirl-repacks.site/cyberpunk-2077/ --dry-run
        continue-on-error: true

      - name: Check for common scraping errors
        run: |
          python fitgrab https://fitgirl-repacks.site/cyberpunk-2077/ --dry-run 2>&1 | tee test_output.log
          
          if grep -q "No FuckingFast links found" test_output.log; then
            echo "ERROR: Scraping failed - no FF links found"
            exit 1
          fi
          
          if grep -q "paste.fitgirl-repacks.site" test_output.log; then
            echo "OK: PrivateBin paste links are being detected"
          else
            echo "WARNING: PrivateBin paste links not detected"
          fi
        continue-on-error: true

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Health check failed - Scraping may be broken',
              body: 'The scheduled health check has failed. This may indicate that:\n\n' +
                    '- FitGirl site structure has changed\n' +
                    '- FuckingFast CDN is down or has changed\n' +
                    '- PrivateBin paste format has changed\n\n' +
                    'Please investigate and update the scraping logic if needed.',
              labels: ['bug', 'health-check']
            })

      - name: Success notification
        if: success()
        run: echo "✅ Health check passed - scraping is working correctly"